# Notion DB 폴링 → 재가공 → Word → Telegram
# 스케줄: 매주 월요일 10:00 KST (= 01:00 UTC), 대기 원고 중 가장 오래된 1건만 발송
name: Poll Notion manuscripts

on:
  schedule:
    # 매주 월요일 01:00 UTC = 매주 월요일 10:00 KST
    - cron: "0 1 * * 1"
  workflow_dispatch:
    inputs:
      limit:
        description: "발송 건수 (기본 1, 0=대기 전체)"
        required: false
        default: "1"

concurrency:
  group: poll-notion
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare config
        run: cp config.github.yaml config.yaml

      - name: Poll Notion and send Telegram
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LIMIT: ${{ github.event.inputs.limit || '1' }}
        run: python -m src.poll_notion --limit "$LIMIT"
