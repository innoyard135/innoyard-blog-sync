# config.example.yaml → config.yaml 복사

target:
  author_label: "성형외과·소아과 전문의"

manuscripts:
  dir: manuscripts
  processed_dir: manuscripts/_done
  move_after_process: true

transform:
  model: "claude-sonnet-4-20250514"
  max_source_chars: 12000

sub_topics:
  # true 이면 추천 콘텐츠 아이템마다 본문급 단독 원고를 추가 생성해 zip 으로 묶어 전송
  enabled: true
  count: 2
  model: ""

output:
  docx_dir: output/docx
  image_dir: output/images

image_gen:
  # true 이면 Notion 페이지의 원본 이미지를 Nano Banana(Gemini)로 재생성해 Word 에 삽입
  enabled: false
  model: "gemini-2.5-flash-image-preview"
  max_count: 20
  # 비우면 src/image_gen.py 의 DEFAULT_STYLE_PROMPT 사용 (한국인 아기, 자연 피부톤 등)
  style_prompt: ""

notify:
  # telegram | kakao | both | none
  provider: telegram
  telegram_bot_token: ""   # 비우면 .env TELEGRAM_BOT_TOKEN
  telegram_chat_id: ""     # 비우면 .env TELEGRAM_CHAT_ID
  kakao_access_token: ""   # 비우면 .env KAKAO_ACCESS_TOKEN (선택)

notion:
  # NOTION_TOKEN 은 .env 에 저장
  database_id: ""
  # 노션 DB 컬럼 이름 (본인 DB와 다르면 수정)
  prop_ready: "게시준비"
  prop_status: "상태"
  status_pending: "대기"
  status_done: "발송완료"
  prop_sent_date: "telegram 발송일"
  create_result_page: false
  result_parent_page_id: ""

# --- 네이버 RSS 모드 (선택, python -m src.main) ---
source:
  blog_id: ""
  rss_url: ""

filter:
  keywords:
    - "두상"
    - "사두"
    - "단두"
    - "사경"
