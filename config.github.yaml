# GitHub Actions 전용 (비밀 없음). 워크플로에서 config.yaml 로 복사됩니다.
# 로컬 개발은 config.yaml 을 그대로 사용하세요.

target:
  author_label: "성형외과·소아과 전문의"

manuscripts:
  dir: manuscripts
  processed_dir: manuscripts/_done
  move_after_process: false

transform:
  model: "claude-sonnet-4-20250514"
  max_source_chars: 12000

sub_topics:
  # true 이면 추천 콘텐츠 아이템마다 본문급 단독 원고를 추가 생성해 zip 으로 묶어 전송
  enabled: true
  count: 2
  # 비우면 transform.model 그대로 사용
  model: ""

output:
  docx_dir: output/docx
  image_dir: output/images

image_gen:
  # 보류 상태 — true 로 바꾸면 Nano Banana(Gemini) 이미지 재생성 활성화
  enabled: false
  model: "gemini-2.5-flash-image-preview"
  max_count: 20
  style_prompt: ""

notify:
  provider: telegram
  telegram_bot_token: ""
  telegram_chat_id: ""

notion:
  database_id: "36679185-e0a4-802d-a770-c260b4d7a9f3"
  prop_ready: "게시준비"
  prop_status: "상태"
  status_pending: "대기"
  status_done: "발송완료"
  prop_sent_date: "telegram 발송일"
  create_result_page: false
  result_parent_page_id: ""

source:
  blog_id: ""
  rss_url: ""

filter:
  keywords:
    - "두상"
    - "사두"
    - "단두"
    - "사경"
